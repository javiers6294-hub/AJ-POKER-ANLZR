<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Poker Lab Pro - A ∩ B Absolute</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    
    <script async crossorigin="anonymous" 
        data-clerk-publishable-key="pk_test_bmV4dC1tYWtvLTEuY2xlcmsuYWNjb3VudHMuZGV2JA" 
        src="https://cdn.jsdelivr.net/npm/@clerk/clerk-js@latest/dist/clerk.browser.js">
    </script>
    <script src="https://js.stripe.com/v3/"></script>

    <style>
        :root { --bg: #080808; --panel: #121212; --accent: #f1c40f; --j1: #2ecc71; --j2: #3498db; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #ececec; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Capas de bloqueo */
        #auth-overlay, #pay-overlay { 
            position: fixed; inset: 0; background: var(--bg); 
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; 
        }
        #pay-overlay { background: rgba(8, 8, 8, 0.95); display: none; }
        
        .hero-title { color: var(--accent); letter-spacing: 5px; margin-bottom: 10px; font-size: 2.5rem; }
        .price-card { background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid var(--accent); text-align: center; }
        
        #app-content { display: none; width: 100%; height: 100%; }

        /* Tus estilos originales se mantienen intactos aquí... */
        .sidebar { width: 280px; background: var(--panel); border-right: 1px solid #222; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .btn-pro { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 10px; text-transform: uppercase; color: #fff; display: flex; align-items: center; justify-content: center; gap: 8px; border-bottom: 3px solid rgba(0,0,0,0.3); }
        .btn-p1 { background: linear-gradient(135deg, #2ecc71, #27ae60); }
        .btn-p2 { background: linear-gradient(135deg, #3498db, #2980b9); }
    </style>
</head>
<body>

<div id="auth-overlay">
    <h1 class="hero-title">POKER LAB PRO</h1>
    <div id="clerk-login-container"></div>
</div>

<div id="pay-overlay">
    <div class="price-card">
        <h2 style="color:white">Acceso Premium Requerido</h2>
        <p style="color:#888">Desbloquea todas las funciones de análisis.</p>
        <h1 style="color:var(--accent)">$19.99<small>/mes</small></h1>
        <button class="btn-pro btn-p1" id="checkout-button" style="width:100%; font-size:14px; padding:15px;">
            SUSCRIBIRSE AHORA
        </button>
        <button onclick="window.Clerk.signOut()" style="background:none; border:none; color:#555; margin-top:15px; cursor:pointer;">Cerrar Sesión</button>
    </div>
</div>

<div id="app-content">
    <div class="sidebar">
        <div id="user-button-mount" style="margin-bottom: 10px; display: flex; justify-content: center;"></div>
        <h2 style="color:var(--accent); text-align:center; font-size:1.1rem;">POKER LAB PRO</h2>
        <button class="btn-pro btn-p1" onclick="saveRange('j1')">📥 GUARDAR RANGO P1</button>
        <button class="btn-pro btn-p2" onclick="saveRange('j2')">📥 GUARDAR RANGO P2</button>
        <div id="libBox"></div>
        <button class="btn-pro btn-danger" onclick="location.reload()">🔄 RESET APP</button>
    </div>
    <div class="main-view">
        </div>
</div>



<script>
    // CONFIGURACIÓN
    const STRIPE_PUBLIC_KEY = 'tu_pk_test_aqui'; // Reemplaza con tu clave de Stripe
    const stripe = Stripe(STRIPE_PUBLIC_KEY);

    window.addEventListener('load', async function() {
        const checkClerk = setInterval(async () => {
            if (window.Clerk) {
                clearInterval(checkClerk);
                await window.Clerk.load();

                if (window.Clerk.user) {
                    // El usuario está logueado, verificamos suscripción
                    const isSubscribed = window.Clerk.user.publicMetadata.subscribed === true;

                    if (isSubscribed) {
                        showApp();
                    } else {
                        showPayment();
                    }
                    
                    window.Clerk.mountUserButton(document.getElementById('user-button-mount'));
                } else {
                    window.Clerk.mountSignIn(document.getElementById('clerk-login-container'));
                }
            }
        }, 100);
    });

    function showApp() {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('pay-overlay').style.display = 'none';
        document.getElementById('app-content').style.display = 'flex';
        
        // Cargar script.js original
        const script = document.createElement('script');
        script.src = "script.js";
        document.body.appendChild(script);
    }

    function showPayment() {
        document.getElementById('auth-overlay').style.display = 'none';
        document.getElementById('pay-overlay').style.display = 'flex';
    }

    // Lógica del botón de Stripe
    document.getElementById('checkout-button').addEventListener('click', async () => {
        // Aquí deberías llamar a tu propia API o usar un link de Stripe Checkout
        // Por ahora lo redirigimos a tu link de suscripción creado en el Dashboard de Stripe
        window.location.href = "https://buy.stripe.com/test_bJeaEXfbicts5SI9uU5gc00";
    });
</script>

</body>
</html>
